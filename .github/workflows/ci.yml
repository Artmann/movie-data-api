name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun]
    steps:
      - uses: actions/checkout@v4

      - if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: ${{ matrix.runtime == 'bun' && 'bun install --frozen-lockfile' || 'npm install' }}

      - name: Lint
        run: ${{ matrix.runtime == 'bun' && 'bun' || 'npm' }} run lint

  typecheck:
    name: Typecheck (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun]
    steps:
      - uses: actions/checkout@v4

      - if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: ${{ matrix.runtime == 'bun' && 'bun install --frozen-lockfile' || 'npm install' }}

      - name: Typecheck
        run: ${{ matrix.runtime == 'bun' && 'bun' || 'npm' }} run typecheck

  test:
    name: Test (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun]
    steps:
      - uses: actions/checkout@v4

      - if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: ${{ matrix.runtime == 'bun' && 'bun install --frozen-lockfile' || 'npm install' }}

      - name: Test
        run: ${{ matrix.runtime == 'bun' && 'bun' || 'npm' }} run test
